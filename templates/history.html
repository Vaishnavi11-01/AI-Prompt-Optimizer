<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt History - AI Prompt Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Prompt History</h1>
            <div class="nav-buttons">
                <a href="/" class="btn-secondary">← Back</a>
                <a href="/stats" class="btn-secondary">Statistics</a>
                <button class="btn-secondary" id="export-btn">Export JSON</button>
            </div>
        </header>

        <main>
            <!-- Search and Filter Section -->
            <section class="search-section">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search prompts..."
                    class="search-input"
                >
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="today">Today</button>
                    <button class="filter-btn" data-filter="yesterday">Yesterday</button>
                    <button class="filter-btn" data-filter="week">Last Week</button>
                </div>
            </section>

            <!-- History List -->
            <section class="history-section">
                <div id="history-list">
                    <p class="loading">Loading history...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='history.js') }}"></script>
</body>
</html>
