<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Prompt Optimizer</h1>
            <div class="nav-buttons">
                <a href="/history" class="btn-secondary">History</a>
                <a href="/stats" class="btn-secondary">Statistics</a>
            </div>
        </header>

        <main>
            <section class="input-section">
                <h2>Enter Prompt</h2>
                <textarea 
                    id="prompt-input" 
                    placeholder="Type or paste your prompt here..."
                    rows="6"
                ></textarea>
                <button id="optimize-btn" class="btn">Optimize</button>
            </section>

            <section class="results-section hidden" id="results-section">
                <h2>Optimization Results</h2>
                
                <div class="dashboard-grid">
                    <!-- Overall Score Card -->
                    <div class="score-card">
                        <h3>Overall Score</h3>
                        <div class="score-circle">
                            <span id="score-value">0</span>
                            <span class="score-max">/100</span>
                        </div>
                        <div class="score-label" id="score-label">Poor</div>
                    </div>

                    <!-- Category Card -->
                    <div class="category-card">
                        <h3>Category</h3>
                        <div class="category-badge" id="category-value">General</div>
                    </div>
                </div>

                <!-- Detailed Score Breakdown -->
                <div class="score-breakdown">
                    <h3>Score Breakdown</h3>
                    
                    <div class="score-item">
                        <div class="score-item-header">
                            <span class="score-item-label">Length</span>
                            <span class="score-item-value" id="length-score">0/20</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="length-progress"></div>
                        </div>
                    </div>

                    <div class="score-item">
                        <div class="score-item-header">
                            <span class="score-item-label">Clarity</span>
                            <span class="score-item-value" id="clarity-score">0/15</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="clarity-progress"></div>
                        </div>
                    </div>

                    <div class="score-item">
                        <div class="score-item-header">
                            <span class="score-item-label">Specificity</span>
                            <span class="score-item-value" id="specificity-score">0/15</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="specificity-progress"></div>
                        </div>
                    </div>

                    <div class="score-item">
                        <div class="score-item-header">
                            <span class="score-item-label">Context</span>
                            <span class="score-item-value" id="context-score">0/10</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="context-progress"></div>
                        </div>
                    </div>

                    <div class="score-item">
                        <div class="score-item-header">
                            <span class="score-item-label">Format</span>
                            <span class="score-item-value" id="format-score">0/10</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="format-progress"></div>
                        </div>
                    </div>
                </div>

                <!-- Suggestions Card -->
                <div class="suggestions-card">
                    <h3>Suggestions</h3>
                    <ul id="suggestions-list">
                        <li>No suggestions yet</li>
                    </ul>
                </div>

                <!-- Optimized Text -->
                <div class="optimized-text-card">
                    <h3>Optimized Prompt</h3>
                    <div class="optimized-text-content">
                        <p id="optimized-prompt-text"></p>
                        <div class="action-buttons">
                            <button class="btn-secondary" id="copy-btn">Copy to Clipboard</button>
                            <button class="btn-secondary" id="pdf-btn">Download PDF Report</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
